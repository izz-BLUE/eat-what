server:
  port: 8080
  # 响应编码设置
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: eat-what-backend
  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # 实体类包路径
  type-aliases-package: com.fantuan.eatwhat.domain.entity

# JWT 配置（必须通过环境变量提供）
jwt:
  secret: ${JWT_SECRET}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:604800}

# 管理后台配置
admin:
  token: ${ADMIN_TOKEN:}

# 微信配置（必须通过环境变量提供）
wechat:
  app-id: ${WECHAT_APP_ID}
  app-secret: ${WECHAT_APP_SECRET}
  mock-enabled: ${WECHAT_MOCK_ENABLED:false}

# 日志配置
logging:
  level:
    com.fantuan.eatwhat: info
    org.springframework: info
