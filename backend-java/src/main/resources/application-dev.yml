# 开发环境配置
# 注意：请勿提交真实密码到版本控制

spring:
  datasource:
    # MySQL 连接配置
    # 数据库名：eat_what
    # 用户名：eatwhat
    # 密码：通过环境变量 DB_PASSWORD 设置，默认 eatwhat_dev
    url: jdbc:mysql://localhost:3306/eat_what?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: eatwhat
    password: ${DB_PASSWORD:eatwhat_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Hikari 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

# 日志级别（开发环境更详细）
logging:
  level:
    com.fantuan.eatwhat: debug
    org.springframework: debug
    org.flywaydb: debug
