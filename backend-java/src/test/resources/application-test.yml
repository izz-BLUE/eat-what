# 测试环境配置 - 使用 H2 内存数据库

spring:
  # 禁用 Flyway（测试环境不执行迁移）
  flyway:
    enabled: false
  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;INIT=RUNSCRIPT FROM 'classpath:db/h2-init.sql'
    username: sa
    password:
    driver-class-name: org.h2.Driver
  # H2 控制台（可选）
  h2:
    console:
      enabled: false

# 禁用 MyBatis-Plus 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT 配置（测试环境）
jwt:
  secret: test-jwt-secret-key-at-least-32-bytes
  expiration-seconds: 3600

# 微信配置（测试环境启用 Mock）
wechat:
  app-id: wx_test_app_id
  app-secret: wx_test_app_secret
  mock-enabled: true

# 管理后台配置（测试环境默认 token）
admin:
  token: test-admin-token
