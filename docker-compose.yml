version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eat-what-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: eat_what
      MYSQL_USER: eatwhat
      MYSQL_PASSWORD: eatwhat_dev
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
