# ============================================================
# 今天吃啥 — Nginx 生产配置
# ============================================================
# 域名：api.example.com（部署时替换为真实域名）
# HTTPS 证书路径：/etc/nginx/certs/fullchain.pem / privkey.pem
# ============================================================

# 上游后端服务（Docker 内部 DNS 解析）
upstream backend {
    server backend:8080;
}

# ---- HTTP → HTTPS 重定向（保留 ACME challenge 路径）----
server {
    listen 80;
    server_name api.example.com;

    # ACME 证书验证（Let's Encrypt / acme.sh）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其余请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主服务 ----
server {
    listen 443 ssl;
    http2 on;
    server_name api.example.com;

    # SSL 证书（由 acme.sh 或 certbot 签发后挂载）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 请求体大小限制
    client_max_body_size 2m;

    # ---- API 反向代理 ----
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # ACME challenge（HTTPS 端也保留，续期时需要）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
